version: '3.9'

# ═══════════════════════════════════════════════════════════════════
#  docker-compose.yml  —  Optional local containerization
#
#  WHY Docker-ready but not Docker-required:
#   - Local dev with `npm run dev` is faster (no container overhead)
#   - Docker is useful for: CI pipelines, VPS deployment, team onboarding
#   - This compose file mirrors the local setup exactly
#
#  Usage:
#   docker-compose up --build
# ═══════════════════════════════════════════════════════════════════

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      # Mount storage directory — SQLite and uploads persist between restarts
      - ./backend/storage:/app/storage
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r => process.exit(r.ok?0:1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
